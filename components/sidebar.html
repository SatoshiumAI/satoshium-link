<!-- /components/sidebar.html -->
<style>
:root{
  --sidebar-w: 220px;
  --topbar-h: 68px;
  --bg:#07090d;
  --panel:#0c1018;
  --text:#e8edf7;
  --muted:#9aa7bd;
  --gold:#d6a34a;
  --gold2:#f4c36a;
  --line:rgba(214,163,74,.18);
}

.sidebar{
  position:fixed;
  top:var(--topbar-h);
  left:0;
  bottom:0;
  width:var(--sidebar-w);
  background:linear-gradient(180deg, rgba(12,16,24,.98), rgba(7,9,13,.96));
  border-right:1px solid var(--line);
  overflow-y:auto;
  z-index:950;
}

.sidebar-inner{
  padding:18px 14px 24px;
}

.sidebar .nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.sidebar .nav a{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid transparent;
  color:var(--muted);
  text-decoration:none;
  font-size:14px;
  transition:background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
}

.sidebar .nav a::after{
  content:"›";
  color:rgba(244,195,106,.75);
}

.sidebar .nav a:hover{
  color:var(--gold2);
  background:rgba(214,163,74,.07);
  border-color:var(--line);
  transform:translateX(2px);
}

.sidebar .nav a.active{
  color:var(--gold2);
  background:rgba(214,163,74,.10);
  border-color:var(--line);
  font-weight:600;
}

@media (max-width: 980px){
  .sidebar{
    display:none;
  }
}
</style>

<aside class="sidebar" aria-label="Satoshium section sidebar">
  <div class="sidebar-inner">
    <nav class="nav" aria-label="Secondary navigation">
      <a href="https://satoshium.link/" data-nav="link">Link</a>
      <a href="https://satoshiumai.github.io/satoshium-progress/" target="_blank" rel="noopener" data-nav="progress">Progress</a>
      <a href="https://satoshium.dev/" target="_blank" rel="noopener" data-nav="dev">Dev</a>
      <a href="https://satoshium.xyz/" target="_blank" rel="noopener" data-nav="xyz">XYZ</a>
      <a href="https://satoshium.info/" target="_blank" rel="noopener" data-nav="info">Info</a>
      <a href="https://satoshium.info/workspace/" data-nav="workspace">Workspace</a>
      <a href="https://satoshium.net/" data-nav="net">Net</a>
      <a href="https://satoshium.store/" target="_blank" rel="noopener" data-nav="store">Store</a>
      <a href="https://satoshium.us/" target="_blank" rel="noopener" data-nav="us">U.S.</a>
      <a href="https://satoshium.ai/" target="_blank" rel="noopener" data-nav="mainsite">Main Site</a>
    </nav>
  </div>
</aside>
